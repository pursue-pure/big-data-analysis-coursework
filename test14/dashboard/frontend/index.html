<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M4 系统联调评论看板</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
    <style>
        :root {
            --bg: #f4f7fb;
            --panel: #ffffff;
            --line: #d7deea;
            --text: #172033;
            --muted: #667085;
            --blue: #2563eb;
            --teal: #139d8f;
            --red: #df5b52;
            --amber: #d89722;
            --violet: #7357c8;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
        }

        header {
            background: var(--panel);
            border-bottom: 1px solid var(--line);
            padding: 16px 28px;
        }

        .bar {
            max-width: 1360px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 18px;
        }

        h1 {
            margin: 0;
            font-size: 22px;
            letter-spacing: 0;
        }

        .server-status {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--muted);
            font-size: 13px;
            white-space: nowrap;
        }

        .degrade-banner {
            display: none;
            max-width: 1360px;
            margin: 14px auto 0;
            border: 1px solid #f1c27d;
            background: #fff7e8;
            color: #7a4b00;
            border-radius: 8px;
            padding: 10px 12px;
            font-size: 14px;
            line-height: 1.5;
        }

        .degrade-banner strong {
            color: #583400;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--teal);
        }

        main {
            max-width: 1360px;
            margin: 0 auto;
            padding: 18px 28px 34px;
        }

        .toolbar {
            display: grid;
            grid-template-columns: 1fr 170px 170px 120px;
            gap: 12px;
            margin-bottom: 14px;
        }

        input, select, button {
            width: 100%;
            height: 42px;
            border: 1px solid var(--line);
            border-radius: 7px;
            background: #fff;
            color: var(--text);
            padding: 0 12px;
            font: inherit;
        }

        button {
            cursor: pointer;
            background: var(--blue);
            color: #fff;
            border-color: var(--blue);
            font-weight: 700;
        }

        .metrics {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 12px;
            margin-bottom: 14px;
        }

        .metric, .panel {
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 8px;
        }

        .metric {
            padding: 12px 14px;
            min-height: 74px;
        }

        .metric span {
            display: block;
            color: var(--muted);
            font-size: 13px;
        }

        .metric strong {
            display: block;
            margin-top: 5px;
            font-size: 24px;
            line-height: 1.2;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }

        .panel h2 {
            margin: 0;
            padding: 14px 16px 0;
            font-size: 16px;
        }

        .panel small {
            display: block;
            padding: 4px 16px 0;
            color: var(--muted);
        }

        .chart {
            width: 100%;
            height: 390px;
        }

        .wide {
            grid-column: 1 / -1;
        }

        .wide .chart {
            height: 360px;
        }

        .reviews-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            padding: 14px 16px 0;
        }

        .reviews-head h2 {
            padding: 0;
        }

        .review-list {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 12px;
            padding: 16px;
        }

        .review-item {
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 12px;
            background: #fbfcff;
            min-height: 118px;
        }

        .meta {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
            color: var(--muted);
            font-size: 13px;
        }

        .badge {
            color: #fff;
            border-radius: 999px;
            padding: 2px 8px;
            font-size: 12px;
        }

        .positive { background: var(--teal); }
        .negative { background: var(--red); }
        .neutral { background: var(--amber); }

        .review-text {
            display: -webkit-box;
            -webkit-line-clamp: 4;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.6;
            font-size: 14px;
        }

        .empty {
            padding: 28px 16px;
            color: var(--muted);
        }

        @media (max-width: 980px) {
            .toolbar, .metrics, .grid, .review-list {
                grid-template-columns: 1fr;
            }
            main { padding: 16px; }
            header { padding: 15px 16px; }
            .bar { align-items: flex-start; flex-direction: column; }
            .chart, .wide .chart { height: 340px; }
        }
    </style>
</head>
<body>
    <header>
        <div class="bar">
            <h1>M4 系统联调评论看板</h1>
            <div class="server-status"><span class="dot"></span><span id="statusText">连接中</span></div>
        </div>
        <div class="degrade-banner" id="degradeBanner"></div>
    </header>

    <main>
        <section class="toolbar">
            <input id="searchInput" placeholder="正则搜索评论，如 ^苹果|iphone 或 [差烂]">
            <select id="categorySelect"><option value="">全部品类</option></select>
            <select id="sentimentSelect">
                <option value="">全部情感</option>
                <option value="正面">正面</option>
                <option value="负面">负面</option>
                <option value="中性">中性</option>
            </select>
            <button id="resetButton">重置筛选</button>
        </section>

        <section class="metrics">
            <div class="metric"><span>筛选后样本</span><strong id="filteredRows">-</strong></div>
            <div class="metric"><span>当前品类</span><strong id="activeCategory">全部</strong></div>
            <div class="metric"><span>当前情感</span><strong id="activeSentiment">全部</strong></div>
            <div class="metric"><span>Brush 框选</span><strong id="selectedCount">0</strong></div>
        </section>

        <section class="grid">
            <div class="panel">
                <h2>品类分布</h2>
                <small>点击柱子后更新全局品类状态</small>
                <div class="chart" id="categoryChart"></div>
            </div>
            <div class="panel">
                <h2>情感分布</h2>
                <small>点击堆叠色块后更新全局情感状态</small>
                <div class="chart" id="sentimentChart"></div>
            </div>
            <div class="panel wide">
                <h2>选项 B：Brush 区域刷选散点图</h2>
                <small>使用右上角刷子工具框选点，下方评论列表会按 source_index 刷新</small>
                <div class="chart" id="brushChart"></div>
            </div>
        </section>

        <section class="panel" style="margin-top:14px;">
            <div class="reviews-head">
                <h2>评论列表</h2>
                <small id="queryMode">query_mode: none</small>
            </div>
            <div class="review-list" id="reviewList"></div>
        </section>
    </main>

    <script>
        const dashboardState = {
            category: null,
            sentiment: "",
            searchQuery: "",
            selectedIds: []
        };

        const categoryChart = echarts.init(document.getElementById('categoryChart'));
        const sentimentChart = echarts.init(document.getElementById('sentimentChart'));
        const brushChart = echarts.init(document.getElementById('brushChart'));

        let scatterData = [];
        let suppressBrushEvent = false;

        function debounce(fn, delay = 400) {
            let timer = null;
            return (...args) => {
                clearTimeout(timer);
                timer = setTimeout(() => fn(...args), delay);
            };
        }

        function formatNumber(value) {
            return Number(value || 0).toLocaleString('zh-CN');
        }

        function sentimentClass(sentiment) {
            if (sentiment === '正面') return 'positive';
            if (sentiment === '负面') return 'negative';
            return 'neutral';
        }

        function buildParams(includeIds = true) {
            const params = new URLSearchParams();
            if (dashboardState.category) params.set('cat', dashboardState.category);
            if (dashboardState.sentiment) params.set('sentiment', dashboardState.sentiment);
            if (dashboardState.searchQuery) params.set('query', dashboardState.searchQuery);
            if (includeIds && dashboardState.selectedIds.length) {
                params.set('ids', dashboardState.selectedIds.join(','));
            }
            return params.toString();
        }

        async function fetchJson(url) {
            const response = await fetch(url);
            if (!response.ok) throw new Error(`${response.status} ${response.statusText}`);
            return response.json();
        }

        function updateStatePanel(rows = null) {
            if (rows !== null) document.getElementById('filteredRows').textContent = formatNumber(rows);
            document.getElementById('activeCategory').textContent = dashboardState.category || '全部';
            document.getElementById('activeSentiment').textContent = dashboardState.sentiment || '全部';
            document.getElementById('selectedCount').textContent = formatNumber(dashboardState.selectedIds.length);
            document.getElementById('categorySelect').value = dashboardState.category || '';
            document.getElementById('sentimentSelect').value = dashboardState.sentiment || '';
        }

        async function loadHealth() {
            const health = await fetchJson('/api/health');
            document.getElementById('statusText').textContent =
                `${health.message} · ${formatNumber(health.rows)} 条 · ${health.categories} 类`;
        }

        async function loadSystemStatus() {
            const status = await fetchJson('/api/system-status');
            const banner = document.getElementById('degradeBanner');
            const messages = [];
            if (status.llm && !status.llm.llm_active) {
                messages.push('当前大模型功能已降级为内置规则与历史数据看板，请配置 API Key 以启用完整 LLM 功能。');
            }
            if (status.data && status.data.data_degraded) {
                messages.push(`数据源处于降级状态：${status.data.fallback_reason || status.data.source}`);
            }
            if (messages.length) {
                banner.style.display = 'block';
                banner.innerHTML = `<strong>系统降级提示：</strong>${messages.join(' ')}`;
            } else {
                banner.style.display = 'none';
                banner.textContent = '';
            }
        }

        async function loadStatsAndReviews() {
            const params = buildParams(true);
            const stats = await fetchJson(`/api/stats${params ? `?${params}` : ''}`);
            renderCategoryChart(stats.category_distribution);
            renderSentimentChart(stats.sentiment_overview);
            updateStatePanel(stats.rows);

            const reviews = await fetchJson(`/api/reviews${params ? `?${params}&limit=10` : '?limit=10'}`);
            document.getElementById('queryMode').textContent = `query_mode: ${reviews.query_mode}`;
            renderReviews(reviews.data);
        }

        async function loadScatterPoints() {
            const params = buildParams(false);
            const payload = await fetchJson(`/api/scatter-points${params ? `?${params}&limit=900` : '?limit=900'}`);
            scatterData = payload.data;
            renderBrushChart(payload);
        }

        async function refreshAll(clearBrush = false) {
            if (clearBrush) {
                dashboardState.selectedIds = [];
                suppressBrushEvent = true;
                brushChart.dispatchAction({ type: 'brush', areas: [] });
                setTimeout(() => {
                    suppressBrushEvent = false;
                }, 0);
            }
            await Promise.all([loadStatsAndReviews(), loadScatterPoints()]);
        }

        function renderCategoryChart(payload) {
            categoryChart.clear();
            categoryChart.setOption({
                color: ['#2563eb'],
                grid: { left: 58, right: 22, top: 28, bottom: 82 },
                tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' } },
                xAxis: {
                    type: 'category',
                    data: payload.categories,
                    axisLabel: { rotate: 35, color: '#667085' }
                },
                yAxis: {
                    type: 'value',
                    axisLabel: { color: '#667085' },
                    splitLine: { lineStyle: { color: '#e5e7eb' } }
                },
                series: [{
                    name: '样本数',
                    type: 'bar',
                    data: payload.counts,
                    barMaxWidth: 42,
                    itemStyle: { borderRadius: [4, 4, 0, 0] }
                }]
            }, true);
        }

        function renderSentimentChart(payload) {
            const categories = payload.data.map(row => row.category);
            const colorMap = { '正面': '#139d8f', '负面': '#df5b52', '中性': '#d89722' };
            sentimentChart.clear();
            sentimentChart.setOption({
                color: payload.sentiments.map(name => colorMap[name]),
                legend: { top: 0, textStyle: { color: '#667085' } },
                grid: { left: 58, right: 22, top: 44, bottom: 82 },
                tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' } },
                xAxis: {
                    type: 'category',
                    data: categories,
                    axisLabel: { rotate: 35, color: '#667085' }
                },
                yAxis: {
                    type: 'value',
                    axisLabel: { color: '#667085' },
                    splitLine: { lineStyle: { color: '#e5e7eb' } }
                },
                series: payload.sentiments.map(sentiment => ({
                    name: sentiment,
                    type: 'bar',
                    stack: 'total',
                    data: payload.data.map(row => row[sentiment] || 0),
                    barMaxWidth: 42
                }))
            }, true);
        }

        function renderBrushChart(payload) {
            brushChart.clear();
            brushChart.setOption({
                color: ['#7357c8'],
                toolbox: {
                    right: 22,
                    feature: {
                        brush: { type: ['rect', 'polygon', 'clear'] },
                        restore: {},
                        saveAsImage: {}
                    }
                },
                brush: {
                    toolbox: ['rect', 'polygon', 'clear'],
                    xAxisIndex: 0,
                    yAxisIndex: 0,
                    brushMode: 'multiple',
                    throttleType: 'debounce',
                    throttleDelay: 300
                },
                grid: { left: 72, right: 34, top: 42, bottom: 62 },
                tooltip: {
                    trigger: 'item',
                    formatter: params => {
                        const item = scatterData[params.dataIndex];
                        return `${item.cat}｜${item.sentiment}<br>长度：${item.review_length}<br>#${item.source_index}<br>${item.review}`;
                    }
                },
                xAxis: {
                    type: 'value',
                    name: '评论长度',
                    nameLocation: 'middle',
                    nameGap: 34,
                    axisLabel: { color: '#667085' },
                    splitLine: { lineStyle: { color: '#e5e7eb' } }
                },
                yAxis: {
                    type: 'value',
                    min: -1.3,
                    max: 1.3,
                    name: '情感位置',
                    axisLabel: {
                        color: '#667085',
                        formatter: value => {
                            if (value > 0.7) return '正面';
                            if (value < -0.7) return '负面';
                            if (Math.abs(value) < 0.2) return '中性';
                            return '';
                        }
                    },
                    splitLine: { lineStyle: { color: '#e5e7eb' } }
                },
                series: [{
                    name: '评论样本',
                    type: 'scatter',
                    symbolSize: data => Math.max(6, Math.min(24, data[0] / 28)),
                    data: scatterData.map(item => item.value),
                    emphasis: { focus: 'series' }
                }]
            }, true);
        }

        function renderReviews(records) {
            const list = document.getElementById('reviewList');
            if (!records.length) {
                list.innerHTML = '<div class="empty">当前筛选条件下暂无评论。</div>';
                return;
            }
            list.innerHTML = records.map(item => `
                <article class="review-item">
                    <div class="meta">
                        <span>${item.cat}</span>
                        <span class="badge ${sentimentClass(item.sentiment)}">${item.sentiment}</span>
                        <span>#${item.source_index}</span>
                        <span>${item.review_length} 字</span>
                    </div>
                    <div class="review-text">${item.review}</div>
                </article>
            `).join('');
        }

        function bindEventsOnce() {
            categoryChart.off('click');
            categoryChart.on('click', params => {
                dashboardState.category = params.name;
                refreshAll(true);
            });

            sentimentChart.off('click');
            sentimentChart.on('click', params => {
                dashboardState.sentiment = params.seriesName || '';
                refreshAll(true);
            });

            brushChart.off('brushSelected');
            brushChart.on('brushSelected', params => {
                if (suppressBrushEvent) return;
                const ids = [];
                const selected = params.batch?.[0]?.selected || [];
                selected.forEach(item => {
                    (item.dataIndex || []).forEach(index => {
                        if (scatterData[index]) ids.push(scatterData[index].source_index);
                    });
                });
                dashboardState.selectedIds = Array.from(new Set(ids)).slice(0, 1000);
                updateStatePanel();
                loadStatsAndReviews();
            });

            document.getElementById('categorySelect').addEventListener('change', event => {
                dashboardState.category = event.target.value || null;
                refreshAll(true);
            });

            document.getElementById('sentimentSelect').addEventListener('change', event => {
                dashboardState.sentiment = event.target.value || '';
                refreshAll(true);
            });

            document.getElementById('searchInput').addEventListener('input', debounce(event => {
                dashboardState.searchQuery = event.target.value.trim();
                refreshAll(true);
            }, 400));

            document.getElementById('resetButton').addEventListener('click', () => {
                dashboardState.category = null;
                dashboardState.sentiment = '';
                dashboardState.searchQuery = '';
                dashboardState.selectedIds = [];
                document.getElementById('searchInput').value = '';
                refreshAll(true);
            });

            window.addEventListener('resize', () => {
                categoryChart.resize();
                sentimentChart.resize();
                brushChart.resize();
            });
        }

        async function init() {
            bindEventsOnce();
            await loadHealth();
            await loadSystemStatus();
            const categoryData = await fetchJson('/api/category-distribution');
            document.getElementById('categorySelect').innerHTML = [
                '<option value="">全部品类</option>',
                ...categoryData.categories.map(cat => `<option value="${cat}">${cat}</option>`)
            ].join('');
            await refreshAll(false);
        }

        init().catch(error => {
            document.getElementById('statusText').textContent = `连接失败：${error.message}`;
            document.getElementById('reviewList').innerHTML =
                '<div class="empty">数据加载失败，请检查 FastAPI 服务是否启动。</div>';
        });
    </script>
</body>
</html>
